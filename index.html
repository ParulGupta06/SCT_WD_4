<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TO-DO WEB APP</title>
 
  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
 
  <link rel="stylesheet" href="style.css" />
</head>
 
<body>
 
  <!-- ── Background ambient orbs ── -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
 
  <!-- ══════════════ MAIN CONTAINER ══════════════ -->
  <div class="container">
 
    <!-- Header -->
    <header class="app-header">
      <span class="header-badge">✦ TASKS</span>
      <h1 class="app-title">TO-DO WEB APP</h1>
      <p class="app-sub">Organise your day, one task at a time.</p>
    </header>
 
    <!-- ── Input Card ── -->
    <div class="input-card">
 
      <!-- Task text field -->
      <div class="field-group">
        <label for="taskInput">Task</label>
        <input
          type="text"
          id="taskInput"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
      </div>
 
      <!-- Date & Time picker -->
      <div class="field-group">
        <label for="taskDateTime">Date &amp; Time</label>
        <input type="datetime-local" id="taskDateTime" />
      </div>
 
      <!-- Add button -->
      <button id="addBtn" onclick="addTask()">
        <span class="btn-icon">+</span>
        <span>Add Task</span>
      </button>
 
    </div><!-- /input-card -->
 
    <!-- ── Stats bar ── -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>
 
    <!-- ── Task List ── -->
    <ul class="task-list" id="taskList">
      <!-- Tasks injected here by JS -->
    </ul>
 
    <!-- Empty state (shown when no tasks) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◎</div>
      <p>No tasks yet. Add one above!</p>
    </div>
 
  </div><!-- /container -->
 
  <!-- ── Edit Modal ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <h2 class="modal-title">Edit Task</h2>
 
      <div class="field-group">
        <label for="editTaskInput">Task</label>
        <input type="text" id="editTaskInput" placeholder="Update task name…" />
      </div>
 
      <div class="field-group">
        <label for="editDateTime">Date &amp; Time</label>
        <input type="datetime-local" id="editDateTime" />
      </div>
 
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save"   onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
